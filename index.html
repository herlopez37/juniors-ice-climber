<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Ice Climber — Juniors Producciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#000; overflow:hidden; touch-action:none; }
body { display:flex; flex-direction:column; align-items:center; justify-content:center; }
canvas { image-rendering:pixelated; image-rendering:crisp-edges; display:block; }
#ctrl { color:#555; font:10px monospace; margin-top:6px; text-align:center; letter-spacing:.5px; }
#tui {
  display:none;
  position:fixed; bottom:0; left:0; right:0;
  height:88px;
  flex-direction:row; align-items:center; justify-content:space-between;
  padding:10px 16px 12px;
  background:linear-gradient(transparent,rgba(0,0,0,0.55));
  touch-action:none; user-select:none; -webkit-user-select:none;
  z-index:50;
}
.tg { display:flex; gap:10px; align-items:center; }
.tb {
  width:58px; height:58px;
  background:rgba(255,255,255,0.10);
  border:2px solid rgba(255,255,255,0.22);
  border-radius:14px;
  color:rgba(255,255,255,0.85);
  font-size:22px;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:2px;
  touch-action:none; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:background .05s;
}
.tb.on { background:rgba(255,255,255,0.32); border-color:rgba(255,255,255,0.55); }
.tb small { font-size:9px; color:rgba(255,255,255,0.6); font-family:monospace; }
#tb-ok {
  width:64px; height:64px; font-size:11px; font-family:monospace; font-weight:bold;
  letter-spacing:.5px; line-height:1.3; text-align:center;
  background:rgba(248,216,0,0.14); border-color:rgba(248,216,0,0.4); color:#F8D800;
  border-radius:32px;
}
#tb-ok.on { background:rgba(248,216,0,0.35); }
#tb-j { background:rgba(0,200,80,0.12); border-color:rgba(0,255,100,0.32); }
#tb-j.on { background:rgba(0,200,80,0.35); }
@media (pointer:coarse) {
  #tui  { display:flex; }
  #ctrl { display:none; }
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tui">
  <div class="tg">
    <button class="tb" id="tb-l">◀</button>
    <button class="tb" id="tb-r">▶</button>
  </div>
  <button class="tb" id="tb-ok">ENTER<br>START</button>
  <div class="tg">
    <button class="tb" id="tb-h">⚒<small>X</small></button>
    <button class="tb" id="tb-j">↑<small>Z</small></button>
  </div>
</div>
<div id="ctrl">P1: ← → &nbsp; Z=Saltar &nbsp; X=Martillo/Poder(aire) &nbsp;|&nbsp; P2: A D &nbsp; G=Saltar &nbsp; H=Martillo/Poder(aire) &nbsp;|&nbsp; ENTER=Confirmar</div>
<script>
// ═══════════════════════════════════════════════════════
// ICE CLIMBER — Juniors Producciones
// ═══════════════════════════════════════════════════════
const C = document.getElementById('c');
const X = C.getContext('2d');
X.imageSmoothingEnabled = false;

const NW = 256, NH = 240, TILE = 16, COLS = 16;
let highScore = parseInt(localStorage.getItem('iceClimberHiScore')||'0');

const isTouch = () => window.matchMedia('(pointer:coarse)').matches;
function resize() {
  const touch = isTouch();
  const uiH = touch ? 88 : 24;
  const sx = innerWidth / NW;
  const sy = (innerHeight - uiH) / NH;
  const raw = Math.min(sx, sy);
  const s = touch ? Math.max(1, raw) : Math.max(1, Math.floor(raw));
  C.width = NW; C.height = NH;
  C.style.width = Math.floor(NW*s)+'px'; C.style.height = Math.floor(NH*s)+'px';
}
resize(); addEventListener('resize', resize);
document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});

// ── Input ──────────────────────────────────────────────
const K = {};
const KEY = e => { K[e.code] = e.type === 'keydown'; if(['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault(); };
addEventListener('keydown', KEY); addEventListener('keyup', KEY);
function p1Input() { return { L:K.ArrowLeft,  R:K.ArrowRight, J:K.KeyZ, H:K.KeyX }; }
function p2Input() { return { L:K.KeyA,        R:K.KeyD,       J:K.KeyG, H:K.KeyH }; }

// ── Touch controls ──────────────────────────────────────
function setupTouch() {
  const map = {
    'tb-l':'ArrowLeft', 'tb-r':'ArrowRight',
    'tb-j':'KeyZ', 'tb-h':'KeyX', 'tb-ok':'Enter',
  };
  for(const [id,code] of Object.entries(map)){
    const el = document.getElementById(id);
    if(!el) continue;
    el.addEventListener('pointerdown', e=>{
      e.preventDefault();
      el.setPointerCapture(e.pointerId);
      K[code]=true; el.classList.add('on');
    },{passive:false});
    const release = ()=>{ K[code]=false; el.classList.remove('on'); };
    el.addEventListener('pointerup', release);
    el.addEventListener('pointerleave', release);
    el.addEventListener('pointercancel', release);
  }
}
setupTouch();
const justPressed = {}; const wasDown = {};
function updateJP() { for(const k in K){ justPressed[k]=K[k]&&!wasDown[k]; wasDown[k]=K[k]; } }
function jp(k){ return justPressed[k]; }

// ── Audio ───────────────────────────────────────────────
let AC;
function initAC(){ if(AC)return; try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function beep(f,d,t='square',v=0.12,delay=0){
  if(!AC)return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=t; o.frequency.value=f;
  const s=AC.currentTime+delay;
  g.gain.setValueAtTime(v,s);
  g.gain.exponentialRampToValueAtTime(0.001,s+d);
  o.start(s); o.stop(s+d);
}
function sfxJump(){ beep(330,0.08); beep(495,0.07,'square',0.1,0.06); }
function sfxBreak(){ beep(880,.04,'sawtooth',.15); beep(440,.05,'sawtooth',.1,.04); }
function sfxDie(){ [440,330,220,165].forEach((f,i)=>beep(f,.12,'sawtooth',.15,i*.1)); }
function sfxClear(){ [523,659,784,1046].forEach((f,i)=>beep(f,.15,'square',.12,i*.12)); }
function sfxStep(){ beep(200,.03,'square',.06); }
function sfxBonus(){ [784,988,1175].forEach((f,i)=>beep(f,.1,'square',.12,i*.09)); }
function sfxSelect(){ beep(660,.08,'square',.1); }
function sfxEnemy(){ beep(150,.1,'sawtooth',.12); }
function sfxPower(type){
  if(type==='DASH'){ beep(660,.1,'square',.15); beep(990,.1,'square',.12,.1); }
  else if(type==='WAVE'){ beep(110,.4,'sawtooth',.2); beep(220,.3,'sawtooth',.15,.1); }
  else if(type==='STOMP'){ beep(100,.15,'square',.2); }
  else if(type==='FLOAT'){ beep(880,.15,'square',.1); beep(1100,.1,'square',.08,.12); }
  else if(type==='FLY'){ beep(440,.1,'square',.12); beep(880,.2,'square',.1,.08); }
}

// ── Music: The Final Countdown ──────────────────────────
const _fc = { timer:null, nodes:[] };
function stopFC() {
  clearTimeout(_fc.timer); _fc.timer=null;
  _fc.nodes.forEach(o=>{try{o.stop();}catch(e){}});
  _fc.nodes=[];
}
function playFC() {
  if(!AC) return;
  stopFC();
  const bpm=118, b=60/bpm, e=b/2, q=b, dq=b*1.5, h=b*2;
  const n={
    E3:164.81, A3:220.00, B3:246.94,
    E4:329.63, Fs4:369.99, G4:392.00, A4:440.00, B4:493.88,
    C5:523.25, D5:587.33, E5:659.25
  };
  const mel=[
    [n.B4,e],[n.A4,e],[n.B4,q],[n.E5,dq],[n.D5,e],
    [n.B4,q],[n.A4,e],[n.G4,e],[n.A4,q],[n.E4,q],
    [n.B4,e],[n.A4,e],[n.B4,q],[n.E5,dq],[n.D5,e],
    [n.B4,q],[n.A4,e],[n.B4,e],[n.C5,q],[n.D5,q],
  ];
  const dur=mel.reduce((s,[,d])=>s+d,0);
  function sched(fr,dt,dl,vol,type='sawtooth'){
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type;o.frequency.value=fr;
    const t=AC.currentTime+dl;
    g.gain.setValueAtTime(0.001,t);
    g.gain.linearRampToValueAtTime(vol,t+0.015);
    g.gain.setValueAtTime(vol*0.75,t+dt*0.65);
    g.gain.exponentialRampToValueAtTime(0.001,t+dt);
    o.start(t);o.stop(t+dt+0.05);
    _fc.nodes.push(o);
  }
  let t=0;
  mel.forEach(([f,d])=>{sched(f,d,t,0.13);t+=d;});
  sched(n.E3,dur/2,0,0.07,'square');
  sched(n.A3,dur/2,dur/2,0.07,'square');
  _fc.timer=setTimeout(playFC,dur*1000-60);
}

// ── Music: Gameplay ────────────────────────────────────
const _gm = { timer:null, nodes:[] };
function stopGameMusic() {
  clearTimeout(_gm.timer); _gm.timer=null;
  _gm.nodes.forEach(o=>{try{o.stop();}catch(e){}});
  _gm.nodes=[];
}
function playGameMusic() {
  if(!AC) return;
  stopGameMusic();
  const bpm=140, b=60/bpm, e=b/2, q=b;
  const n={
    C4:261.63, D4:293.66, E4:329.63, F4:349.23,
    G4:392.00, A4:440.00, Bb4:466.16, C5:523.25
  };
  const mel=[
    [n.C4,e],[n.E4,e],[n.G4,e],[n.C5,e],
    [n.Bb4,e],[n.G4,e],[n.E4,e],[n.D4,q]
  ];
  const dur=mel.reduce((s,[,d])=>s+d,0);
  function sched(fr,dt,dl,vol,type='square'){
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type;o.frequency.value=fr;
    const t=AC.currentTime+dl;
    g.gain.setValueAtTime(0.001,t);
    g.gain.linearRampToValueAtTime(vol,t+0.01);
    g.gain.setValueAtTime(vol*0.6,t+dt*0.5);
    g.gain.exponentialRampToValueAtTime(0.001,t+dt);
    o.start(t);o.stop(t+dt+0.03);
    _gm.nodes.push(o);
  }
  let t=0;
  mel.forEach(([f,d])=>{sched(f,d,t,0.10);t+=d;});
  for(let i=0;i<4;i++) sched(n.C4/2,e*0.9,i*q,0.06,'sawtooth');
  _gm.timer=setTimeout(playGameMusic,dur*1000-40);
}

// ── Palette ─────────────────────────────────────────────
const SKY = ['#3898F0','#201898','#98380C','#084808','#5820B0','#085858'];
const MTN = ['#2050C0','#1010A0','#803010','#105010','#481898','#0C7070'];

// ── Characters ──────────────────────────────────────────
const CHARS = [
  { name:'Junior',        body:'#0038F8',hat:'#C00000',accent:'#F83000',skin:'#FCA044',witch:false,
    power:'DASH',  powerName:'SUPER DASH',     powerShort:'DASH',  powerCol:'#F8D800' },
  { name:'Cera',          body:'#101010',hat:'#101010',accent:'#303060',skin:'#FCA044',witch:false,
    power:'WAVE',  powerName:'ONDA SONICA',    powerShort:'ONDA',  powerCol:'#00C8FF' },
  { name:'Rodri',         body:'#8B4513',hat:'#8B4513',accent:'#C08040',skin:'#C08040',witch:false,
    power:'STOMP', powerName:'PISOTON',        powerShort:'STOMP', powerCol:'#F86000' },
  { name:'Anto',          body:'#E018B0',hat:'#F8D800',accent:'#F840C8',skin:'#FCA044',witch:false,
    power:'FLOAT', powerName:'FLOTACION',      powerShort:'FLOAT', powerCol:'#FF88FF' },
  { name:'Milagros Sosa', body:'#380068',hat:'#101010',accent:'#7800C8',skin:'#38C838',witch:true,
    power:'FLY',   powerName:'VUELO MAGICO',   powerShort:'VUELO', powerCol:'#A000FF' },
];

// ── Difficulty & Story ───────────────────────────────────
const DIFFICULTIES = [
  { label:'FACIL',   enemyMult:0.5, windMax:0,   invFrames:180, iceFactor:300 },
  { label:'NORMAL',  enemyMult:1.0, windMax:0.7, invFrames:120, iceFactor:240 },
  { label:'DIFICIL', enemyMult:1.5, windMax:1.4, invFrames:60,  iceFactor:150 },
];
const STORIES = [
  { name:'CUMBRE NEVADA', desc:'Conquista la cima helada', skyOff:0, scoreMult:1.0 },
  { name:'RESCATE',       desc:'Salva a tus amigos!',      skyOff:2, scoreMult:1.2 },
  { name:'TORNEO',        desc:'El mas rapido gana',       skyOff:4, scoreMult:1.5 },
];

function px(x,y,w,h,col){ X.fillStyle=col; X.fillRect(x,y,w,h); }

function drawChar(cx, cy, ci, frame, facing, hammer) {
  const ch = CHARS[ci];
  X.save();
  if(facing===-1){ X.translate(cx+8,cy+8); X.scale(-1,1); X.translate(-(cx+8),-(cy+8)); }
  const ay = hammer ? cy+5 : cy+8;

  if(ci===0) {
    px(cx,cy+7,3,9,'#C00000'); px(cx+13,cy+7,3,9,'#C00000');
    px(cx+4,cy+0,8,1,ch.skin); px(cx+3,cy+1,10,4,ch.skin);
    px(cx+3,cy+2,4,2,'#2050F8'); px(cx+9,cy+2,4,2,'#2050F8');
    px(cx+5,cy+3,2,1,'#FFFFFF'); px(cx+10,cy+3,2,1,'#FFFFFF');
    px(cx+7,cy+5,2,1,'#C07030'); px(cx+5,cy+6,6,1,'#401000');
    px(cx+2,cy+7,12,5,ch.body);
    px(cx+8,cy+8,3,1,'#F83000'); px(cx+10,cy+8,1,3,'#F83000');
    px(cx+8,cy+11,3,1,'#F83000'); px(cx+8,cy+10,1,1,'#F83000');
    px(cx,ay,2,4,ch.body); px(cx+14,ay,2,4,ch.body);
    if(hammer){ px(cx-1,ay-1,3,2,'#F8D800'); px(cx+14,ay-1,3,2,'#F8D800'); }
    if(frame===0){ px(cx+3,cy+12,5,3,ch.body); px(cx+8,cy+12,5,3,ch.body); }
    else { px(cx+2,cy+11,5,4,ch.body); px(cx+9,cy+13,5,3,ch.body); }
    px(cx+2,cy+15,5,1,ch.hat); px(cx+9,cy+15,5,1,ch.hat);

  } else if(ci===1) {
    px(cx+3,cy,10,3,ch.hat);
    for(const [sx,sh] of [[4,3],[7,4],[10,3]]){ px(cx+sx,cy,2,sh,ch.hat); }
    px(cx+3,cy+4,10,4,ch.skin);
    px(cx+3,cy+5,4,2,'#101010'); px(cx+9,cy+5,4,2,'#101010'); px(cx+7,cy+5,2,1,'#181818');
    px(cx+3,cy+5,1,2,'#484848'); px(cx+6,cy+5,1,2,'#484848');
    px(cx+9,cy+5,1,2,'#484848'); px(cx+12,cy+5,1,2,'#484848');
    px(cx+7,cy+7,2,1,'#C07030'); px(cx+7,cy+8,4,1,'#401000');
    px(cx+2,cy+8,12,5,ch.body);
    px(cx+4,cy+8,3,5,'#282828'); px(cx+9,cy+8,3,5,'#282828');
    px(cx+6,cy+8,4,4,'#383838');
    px(cx,ay,2,4,ch.body); px(cx+14,ay,2,4,ch.body);
    if(hammer){ px(cx-1,ay-1,3,2,'#808080'); px(cx+14,ay-1,3,2,'#808080'); }
    if(frame===0){ px(cx+3,cy+13,5,3,'#1C1C50'); px(cx+8,cy+13,5,3,'#1C1C50'); }
    else { px(cx+2,cy+12,5,4,'#1C1C50'); px(cx+9,cy+14,5,3,'#1C1C50'); }
    px(cx+2,cy+15,5,1,'#201010'); px(cx+9,cy+15,5,1,'#201010');

  } else if(ci===2) {
    px(cx+1,cy,4,3,ch.body); px(cx+2,cy+1,2,2,ch.accent);
    px(cx+11,cy,4,3,ch.body); px(cx+12,cy+1,2,2,ch.accent);
    px(cx+1,cy+3,14,5,ch.body); px(cx+2,cy+2,12,6,ch.body);
    px(cx+4,cy+5,8,3,ch.accent);
    px(cx+2,cy+4,2,2,'#101010'); px(cx+12,cy+4,2,2,'#101010');
    px(cx+2,cy+3,2,1,'#101010'); px(cx+12,cy+3,2,1,'#101010');
    px(cx+6,cy+6,4,1,'#101010');
    px(cx,cy+8,16,5,ch.body);
    px(cx+3,cy+9,10,4,ch.accent);
    px(cx-1,ay,3,4,ch.body); px(cx+14,ay,3,4,ch.body);
    if(hammer){ px(cx-2,ay-1,4,2,'#A06020'); px(cx+14,ay-1,4,2,'#A06020'); }
    if(frame===0){ px(cx+2,cy+13,5,3,ch.body); px(cx+9,cy+13,5,3,ch.body); }
    else { px(cx+1,cy+12,5,4,ch.body); px(cx+10,cy+13,5,4,ch.body); }
    px(cx+1,cy+15,6,1,'#601000'); px(cx+9,cy+15,6,1,'#601000');

  } else if(ci===3) {
    for(const [sx,sh] of [[4,3],[7,4],[10,3]]){ px(cx+sx,cy,2,sh,ch.hat); }
    px(cx+3,cy+2,10,2,ch.hat);
    px(cx+4,cy+1,2,1,'#F80000'); px(cx+7,cy,2,1,'#60C8FF'); px(cx+10,cy+1,2,1,'#38E000');
    px(cx+1,cy+4,3,9,'#F8C820'); px(cx+12,cy+4,3,9,'#F8C820');
    px(cx+3,cy+4,10,4,ch.skin);
    px(cx+4,cy+5,3,2,'#101010'); px(cx+9,cy+5,3,2,'#101010');
    px(cx+4,cy+4,3,1,'#101010'); px(cx+9,cy+4,3,1,'#101010');
    px(cx+5,cy+5,1,1,'#FFFFFF'); px(cx+10,cy+5,1,1,'#FFFFFF');
    px(cx+3,cy+7,2,1,'#F8A0A0'); px(cx+11,cy+7,2,1,'#F8A0A0');
    px(cx+5,cy+8,6,1,'#800000');
    px(cx+2,cy+8,12,3,ch.body);
    px(cx+7,cy+8,2,3,'#F8F8F8');
    px(cx+1,cy+11,14,5,ch.accent);
    px(cx,cy+13,16,3,ch.accent);
    px(cx,ay-1,2,3,ch.skin); px(cx+14,ay-1,2,3,ch.skin);
    if(hammer){ px(cx-1,ay-2,3,2,'#F8D800'); px(cx+14,ay-2,3,2,'#F8D800'); }
    px(cx+4,cy+15,4,1,'#F0D0A0'); px(cx+8,cy+15,4,1,'#F0D0A0');

  } else {
    X.fillStyle=ch.hat;
    X.beginPath(); X.moveTo(cx+8,cy); X.lineTo(cx+2,cy+5); X.lineTo(cx+14,cy+5); X.fill();
    px(cx+1,cy+5,14,2,ch.hat);
    px(cx+1,cy+5,14,1,ch.accent);
    px(cx+3,cy+7,10,5,ch.skin);
    px(cx+3,cy+7,4,1,'#006000'); px(cx+9,cy+7,4,1,'#006000');
    px(cx+4,cy+8,2,2,'#101010'); px(cx+10,cy+8,2,2,'#101010');
    px(cx+4,cy+8,1,1,'#F8F800'); px(cx+10,cy+8,1,1,'#F8F800');
    px(cx+6,cy+10,2,2,'#1A8A1A'); px(cx+12,cy+11,2,1,'#1A8A1A');
    X.fillStyle='#2A8A2A';
    X.beginPath(); X.moveTo(cx+7,cy+9); X.lineTo(cx+11,cy+12); X.lineTo(cx+6,cy+12); X.fill();
    px(cx+5,cy+11,6,1,'#101010'); px(cx+6,cy+10,1,1,'#FFFFFF'); px(cx+10,cy+10,1,1,'#FFFFFF');
    px(cx+1,cy+12,14,4,ch.accent); px(cx+3,cy+12,10,4,ch.body);
    px(cx,ay,2,5,ch.accent); px(cx+14,ay,2,5,ch.accent);
    if(hammer){ px(cx-1,ay-1,3,2,'#F8D800'); px(cx+14,ay-1,3,2,'#F8D800'); }
    if(frame===0){ px(cx+3,cy+15,4,2,ch.body); px(cx+9,cy+15,4,2,ch.body); }
    else { px(cx+2,cy+14,4,3,ch.body); px(cx+10,cy+16,3,2,ch.body); }
    px(cx+2,cy+16,5,1,'#101010'); px(cx+9,cy+16,5,1,'#101010');
  }

  X.restore();
}

function drawTopi(cx, cy, frame) {
  px(cx+3,cy+2,10,8,'#F0F0F0'); px(cx+4,cy+2,8,5,'#F8F8F8');
  px(cx+5,cy+3,2,2,'#202020'); px(cx+9,cy+3,2,2,'#202020');
  px(cx+6,cy+5,4,1,'#E08080');
  px(cx+1,cy+6,3,3,'#D0D0D0'); px(cx+12,cy+6,3,3,'#D0D0D0');
  px(cx+4,cy+7,8,3,'#F0E8E0');
  if(frame===0){ px(cx+3,cy+10,4,2,'#C0C0C0'); px(cx+9,cy+10,4,2,'#C0C0C0'); }
  else         { px(cx+2,cy+10,4,2,'#C0C0C0'); px(cx+10,cy+10,4,2,'#C0C0C0'); }
}

function drawNitpicker(cx, cy, frame) {
  const wing = frame===0 ? cy+3 : cy+6;
  px(cx+3,cy+4,10,7,'#F8C000'); px(cx+2,wing,12,3,'#F8A000');
  px(cx+6,cy+3,6,3,'#F8C000'); px(cx+7,cy+3,2,2,'#000');
  px(cx+10,cy+5,4,2,'#F86000'); px(cx+5,cy+10,6,2,'#F86000');
}

// ── Level Generation ────────────────────────────────────
const T_EMPTY=0, T_SOLID=1, T_ICE=2;
const TOTAL_FLOORS = 8;
const TOTAL_ROWS   = 3 + TOTAL_FLOORS*3 + 2;

function emptyRow(){ return new Array(COLS).fill(T_EMPTY); }
function solidRow(){ return new Array(COLS).fill(T_SOLID); }

function makePlatRow(rng, round, floorIdx) {
  const row = new Array(COLS).fill(T_EMPTY);
  row[0] = row[COLS-1] = T_SOLID;
  const gapChance = Math.max(0.06, 0.28 - round*0.015 - floorIdx*0.008);
  let col = 1;
  while(col < COLS-1) {
    const r = rng();
    if(r < gapChance) {
      const gw = rng() < 0.4 ? 2 : 1;
      for(let i=0; i<gw && col<COLS-1; i++) row[col++] = T_EMPTY;
    } else if(r < gapChance + 0.22) {
      const sw = rng() < 0.45 ? 2 : 1;
      for(let i=0; i<sw && col<COLS-1; i++) row[col++] = T_SOLID;
    } else {
      const iw = rng() < 0.45 ? 2 : rng() < 0.5 ? 3 : 1;
      for(let i=0; i<iw && col<COLS-1; i++) row[col++] = T_ICE;
    }
  }
  if(!row.slice(1,COLS-1).some(t=>t===T_EMPTY)){ row[Math.floor(COLS/2)] = T_EMPTY; }
  return row;
}

function buildLevel(round) {
  const rng = seededRng(round * 31337 + 7);
  const rows = [];
  rows.push(solidRow());
  rows.push(emptyRow());
  rows.push(emptyRow());
  for(let f=0; f<TOTAL_FLOORS; f++) {
    rows.push(emptyRow());
    rows.push(emptyRow());
    rows.push(makePlatRow(rng,round,f));
  }
  rows.push(emptyRow());
  rows.push(emptyRow());
  return rows;
}

function seededRng(seed) {
  let s = seed|0;
  return function() {
    s = (s^(s<<13))>>>0; s = (s^(s>>>7))>>>0; s = (s^(s<<17))>>>0;
    return (s>>>0)/4294967296;
  };
}

// ── Snow ────────────────────────────────────────────────
const snowParticles = [];
function initSnow() {
  for(let i=0;i<40;i++) snowParticles.push({
    x:Math.random()*256, y:Math.random()*240,
    vy:0.3+Math.random()*0.5, vx:(Math.random()-0.5)*0.3, size:Math.random()<0.3?2:1
  });
}
function updateDrawSnow() {
  X.fillStyle='rgba(220,240,255,0.7)';
  snowParticles.forEach(s=>{
    s.y+=s.vy; s.x+=s.vx;
    if(s.y>240) s.y=-2; if(s.x<0) s.x=256; if(s.x>256) s.x=0;
    X.fillRect(s.x|0,s.y|0,s.size,s.size);
  });
}
initSnow();

// ── Screen Shake ─────────────────────────────────────────
let shakeTimer=0, shakeIntensity=0, shakeOffX=0, shakeOffY=0;
function triggerShake(intensity,duration){ shakeIntensity=intensity; shakeTimer=duration; }
function updateShake(){
  if(shakeTimer>0){
    shakeTimer--;
    const s=shakeIntensity*(shakeTimer/8);
    shakeOffX=(Math.random()-0.5)*s*2; shakeOffY=(Math.random()-0.5)*s*2;
  } else { shakeOffX=0; shakeOffY=0; }
}

// ── Ice Particles ────────────────────────────────────────
const iceParticles = [];
class IceParticle {
  constructor(wx,wy,col){
    this.wx=wx; this.wy=wy;
    this.vx=(Math.random()-0.5)*5;
    this.vy=Math.random()*2+0.5;
    this.life=40+Math.random()*20|0; this.maxLife=this.life;
    const cols=col?[col,'#FFFFFF']:['#A0D8F8','#D8F4FF','#FFFFFF','#6898C0'];
    this.col=cols[Math.floor(Math.random()*cols.length)];
    this.size=Math.random()<0.4?4:3;
  }
  update(){ this.vy+=0.15; this.wx+=this.vx; this.wy+=this.vy; this.life--; }
  draw(camY){
    if(this.life<=0)return;
    X.globalAlpha=this.life/this.maxLife;
    X.fillStyle=this.col; X.fillRect(this.wx|0,(this.wy-camY)|0,this.size,this.size);
    X.globalAlpha=1;
  }
}
function spawnIceParticles(wx,wy,col){
  for(let i=0;i<12;i++) iceParticles.push(new IceParticle(wx+(Math.random()-0.5)*12, wy+TILE, col));
}

// ── World ───────────────────────────────────────────────
class World {
  constructor(round) {
    this.round = round;
    this.rows = buildLevel(round);
    this.ROWS = this.rows.length;
    this.HEIGHT = this.ROWS * TILE;
    this.broken = {};
    this.enemies = [];
    this.spawnEnemies(round);
  }

  spawnEnemies(round) {
    const rng = seededRng(round * 99991);
    const mult = gs.diffSettings ? gs.diffSettings.enemyMult : 1.0;
    const numTopi = Math.min(Math.round((3 + Math.floor(round/2)) * mult), 10);
    for(let i=0; i<numTopi; i++) {
      const floor = Math.floor(rng()*6)+1;
      const pRow = 3 + floor*3 + 2;
      const col  = Math.floor(rng()*(COLS-3))+1;
      this.enemies.push(new Topi(col*TILE, pRow*TILE-TILE, pRow));
    }
    if(round >= 3) {
      this.enemies.push(new Nitpicker(rng()*NW, TILE*8));
    }
  }

  getTile(row, col) {
    if(col<0||col>=COLS) return T_SOLID;
    if(row<0) return T_SOLID;
    if(row>=this.ROWS) return T_EMPTY;
    const key = row+'_'+col;
    if(this.broken[key] !== undefined) return T_EMPTY;
    return this.rows[row][col];
  }

  breakIce(row, col) {
    if(row<0||row>=this.ROWS||col<0||col>=COLS) return false;
    if(this.rows[row][col] !== T_ICE) return false;
    const key = row+'_'+col;
    if(this.broken[key] !== undefined) return false;
    const iceFactor = gs.diffSettings ? gs.diffSettings.iceFactor : 240;
    this.broken[key] = iceFactor;
    triggerShake(3, 8);
    spawnIceParticles(col*TILE+8, row*TILE+8);
    return true;
  }

  update() {
    for(const k in this.broken) {
      this.broken[k]--;
      if(this.broken[k]<=0) delete this.broken[k];
    }
    this.enemies.forEach(e=>e.update(this));
    this.enemies = this.enemies.filter(e=>e.alive);
  }

  draw(camY, round) {
    const skyIdx = (round + (gs.story ? STORIES[gs.story].skyOff : 0)) % SKY.length;
    const skyCol = SKY[skyIdx];
    const mtnCol = MTN[skyIdx];

    X.fillStyle = skyCol;
    X.fillRect(0,0,NW,NH);
    updateDrawSnow();

    if(round%6===1||round%6===4) {
      X.fillStyle='#FFFFFF';
      const rng=seededRng(round*777);
      for(let i=0;i<40;i++){
        const sx=Math.floor(rng()*NW), sy=Math.floor(rng()*(NH-48));
        X.fillRect(sx,sy,1,1);
      }
    }

    for(let row=0; row<this.ROWS; row++){
      const sy = row*TILE - camY;
      if(sy>NH+TILE||sy<-TILE) continue;
      for(let col=0; col<COLS; col++){
        const orig = this.rows[row][col];
        if(orig===T_EMPTY) continue;
        const sx = col*TILE;
        const key = row+'_'+col;
        if(this.broken[key]!==undefined){
          const iceFactor = gs.diffSettings ? gs.diffSettings.iceFactor : 240;
          X.globalAlpha = this.broken[key]/iceFactor*0.3;
          drawIceTile(sx,sy,true);
          X.globalAlpha=1;
          continue;
        }
        if(orig===T_SOLID) drawPlatformTile(sx,sy,mtnCol);
        else if(orig===T_ICE) drawIceTile(sx,sy,false);
      }
    }

    this.enemies.forEach(e=>e.draw(camY));
  }
}

function drawPlatformTile(sx, sy, col) {
  px(sx,sy,TILE,TILE,col);
  px(sx,sy,TILE,2,'#FFFFFF');
  px(sx,sy+2,TILE,1,'rgba(255,255,255,0.3)');
  px(sx,sy+TILE-2,TILE,2,'rgba(0,0,0,0.3)');
}

function drawIceTile(sx, sy, ghost) {
  px(sx+1,sy+1,TILE-2,TILE-2,'#A0D8F8');
  px(sx+1,sy+1,TILE-2,2,'#D8F4FF');
  px(sx+1,sy+1,2,TILE-2,'#D8F4FF');
  px(sx+TILE-3,sy+1,2,TILE-2,'#6898C0');
  px(sx+1,sy+TILE-3,TILE-2,2,'#6898C0');
  if(!ghost){
    X.fillStyle='#C8ECFF';
    X.fillRect(sx+6,sy+4,4,1); X.fillRect(sx+7,sy+3,2,3);
    X.fillRect(sx+5,sy+5,1,1); X.fillRect(sx+10,sy+5,1,1);
    X.fillRect(sx+5,sy+9,1,1); X.fillRect(sx+10,sy+9,1,1);
    X.fillRect(sx+6,sy+11,4,1); X.fillRect(sx+7,sy+10,2,3);
  }
}

// ── Enemies ─────────────────────────────────────────────
class Topi {
  constructor(wx, wy, platRow) {
    this.wx = wx; this.wy = wy;
    this.platRow = platRow;
    this.vx = 0.8 * (Math.random()<0.5?1:-1);
    this.frame = 0; this.frameTimer = 0;
    this.alive = true;
  }
  update(world) {
    this.wx += this.vx;
    if(this.wx < 0) this.wx = NW - TILE;
    if(this.wx > NW-TILE) this.wx = 0;
    this.wy = this.platRow * TILE - TILE;
    const nextX = this.wx + this.vx * 4;
    const col = Math.floor((nextX+8)/TILE);
    if(world.getTile(this.platRow,col) === T_EMPTY) this.vx *= -1;
    this.frameTimer++;
    if(this.frameTimer>10){ this.frameTimer=0; this.frame^=1; }
  }
  draw(camY) {
    const sy = this.wy - camY;
    if(sy < -TILE || sy > NH+TILE) return;
    drawTopi(Math.round(this.wx), Math.round(sy), this.frame);
  }
  getBounds() { return {x:this.wx+2,y:this.wy+2,w:12,h:12}; }
}

class Nitpicker {
  constructor(wx, wy) {
    this.wx = wx; this.wy = wy;
    this.vx = 1.2; this.vy = 0.6;
    this.frame = 0; this.frameTimer = 0;
    this.alive = true;
  }
  update(world) {
    this.wx += this.vx; this.wy += this.vy;
    if(this.wx < 0 || this.wx > NW-TILE) this.vx *= -1;
    if(this.wy < 20 || this.wy > world.HEIGHT-32) this.vy *= -1;
    this.frameTimer++;
    if(this.frameTimer>8){ this.frameTimer=0; this.frame^=1; }
  }
  draw(camY) {
    const sy = this.wy - camY;
    if(sy < -TILE || sy > NH+TILE) return;
    drawNitpicker(Math.round(this.wx), Math.round(sy), this.frame);
  }
  getBounds() { return {x:this.wx+3,y:this.wy+3,w:10,h:10}; }
}

// ── Floating Text ────────────────────────────────────────
const floatingTexts = [];
class FloatingText {
  constructor(wx,wy,text,color){
    this.wx=wx; this.wy=wy; this.text=text; this.color=color||'#F8D800';
    this.life=60; this.maxLife=60; this.vy=-0.6;
  }
  update(){ this.wy+=this.vy; this.life--; }
  draw(camY){
    if(this.life<=0)return;
    X.globalAlpha=this.life/this.maxLife;
    X.fillStyle=this.color; X.font='6px '+PF;
    X.fillText(this.text,this.wx|0,(this.wy-camY)|0);
    X.globalAlpha=1;
  }
}

// ── Player ──────────────────────────────────────────────
class Player {
  constructor(wx, charIdx) {
    this.charIdx = charIdx;
    this.wx = wx;
    this.wy = 0;
    this.vx = 0; this.vy = 0;
    this.w = 14; this.h = 16;
    this.onGround = false;
    this.facing = 1;
    this.alive = true;
    this.lives = 3;
    this.score = 0;
    this.hammerTimer = 0;
    this.frame = 0; this.frameTimer = 0;
    this.invTimer = 0;
    this.comboCount = 0; this.comboTimer = 0;
    // Power
    this.powerType = CHARS[charIdx].power;
    this.powerCooldown = 0;
    this.powerActive = 0;
    this.stompLanded = false;
    this.dashActive = false;
  }

  update(world, input, camY) {
    if(!this.alive) return;
    if(this.invTimer>0) this.invTimer--;
    if(this.comboTimer>0) this.comboTimer--;
    else if(this.comboTimer===0 && this.comboCount>0) this.comboCount=0;

    const SPEED = 1.6, JUMP = -6.0, GRAV = 0.3, MAXFALL = 5.5;

    // Horizontal
    if(input.L){ this.vx = -SPEED; this.facing=-1; }
    else if(input.R){ this.vx = SPEED; this.facing=1; }
    else { this.vx *= 0.6; if(Math.abs(this.vx)<0.1) this.vx=0; }
    // Wind
    if(gs.round >= 3 && windForce !== 0) this.vx += windForce * 0.06;

    // Jump
    if(input.J && this.onGround){ this.vy=JUMP; this.onGround=false; initAC(); sfxJump(); }

    // Hammer (ground) or Power (air)
    if(this.hammerTimer>0) this.hammerTimer--;
    if(this.powerCooldown>0) this.powerCooldown--;
    if(input.H && this.hammerTimer===0){
      if(this.onGround){ this.hammerTimer=18; this.tryBreak(world); }
      else if(this.powerCooldown===0){ this.hammerTimer=10; this.activatePower(world); }
    }

    // Active power ongoing effects
    if(this.powerActive>0){
      this.powerActive--;
      if(this.powerType==='FLOAT' && !this.onGround) this.vy=Math.min(this.vy,0.35);
      if(this.powerType==='FLY'   && !this.onGround) this.vy=Math.max(this.vy-0.5,-4.0);
      if(this.powerType==='DASH') this.vx=this.facing*9;
    }
    // STOMP landing
    if(this.powerType==='STOMP' && this.onGround && this.powerActive>0 && !this.stompLanded){
      this.stompLanded=true; this.powerActive=0;
      const br=Math.floor((this.wy+this.h)/TILE), bc=Math.floor(this.wx/TILE);
      for(let dc=-2;dc<=2;dc++){
        if(world.breakIce(br,bc+dc)){
          this.score+=Math.round(100*gs.scoreMult);
          spawnIceParticles(bc*TILE+dc*TILE+8, br*TILE+8, CHARS[this.charIdx].powerCol);
        }
      }
      triggerShake(7,20); initAC(); beep(80,.3,'square',.2);
      floatingTexts.push(new FloatingText(this.wx,this.wy-10,'CRASH!','#F86000'));
    }

    // Gravity
    this.vy += GRAV;
    if(this.vy > MAXFALL) this.vy = MAXFALL;

    // Move X
    this.wx += this.vx;
    if(this.wx < -this.w) this.wx = NW;
    if(this.wx > NW) this.wx = -this.w;

    // Move Y and collide
    this.wy += this.vy;
    this.onGround = false;
    this.resolveCollision(world);

    // Animation
    if(Math.abs(this.vx)>0.2 || !this.onGround){
      this.frameTimer++;
      if(this.frameTimer>7){ this.frameTimer=0; this.frame^=1; }
    } else { this.frame=0; }

    // Death
    if(this.wy > world.HEIGHT + 32){ this.die(world); }

    // Enemy collisions
    if(this.invTimer===0){
      world.enemies.forEach(e=>{
        if(!e.alive) return;
        const eb = e.getBounds(), pb = this.getBounds();
        if(rectsOverlap(pb,eb)){ this.die(world); }
      });
    }
  }

  activatePower(world) {
    const pt = this.powerType;
    this.powerCooldown = 300;
    this.powerActive = 0;
    this.stompLanded = false;
    initAC();
    const ch = CHARS[this.charIdx];
    floatingTexts.push(new FloatingText(this.wx-10, this.wy-16, ch.powerName, ch.powerCol));
    sfxPower(pt);

    if(pt==='DASH'){
      this.powerActive=22;
      this.invTimer=Math.max(this.invTimer,22);
    } else if(pt==='WAVE'){
      const row=Math.floor(this.wy/TILE), bc=Math.floor(this.wx/TILE);
      let n=0;
      for(let dr=-2;dr<=0;dr++){
        for(let dc=-4;dc<=4;dc++){
          if(world.breakIce(row+dr,bc+dc)){
            n++;
            spawnIceParticles((bc+dc)*TILE+8, (row+dr)*TILE+8, ch.powerCol);
          }
        }
      }
      if(n>0){ this.score+=Math.round(n*150*gs.scoreMult); triggerShake(5,15); }
      this.powerActive=15;
    } else if(pt==='STOMP'){
      this.vy=7;
      this.powerActive=120;
    } else if(pt==='FLOAT'){
      if(this.vy>0) this.vy=0;
      this.powerActive=120;
    } else if(pt==='FLY'){
      this.vy=-3;
      this.powerActive=80;
    }
  }

  tryBreak(world) {
    const headRow = Math.floor(this.wy/TILE);
    const col1 = Math.floor((this.wx+1)/TILE);
    const col2 = Math.floor((this.wx+this.w-2)/TILE);
    let broke = false;
    if(world.breakIce(headRow,col1)) broke=true;
    if(col2!==col1 && world.breakIce(headRow,col2)) broke=true;
    if(broke){
      this.comboCount++; this.comboTimer=45;
      const pts=Math.round(100*this.comboCount*gs.scoreMult); this.score+=pts;
      const col=this.comboCount>=3?'#F84000':this.comboCount>=2?'#F8A000':'#F8D800';
      floatingTexts.push(new FloatingText(this.wx, this.wy-8, this.comboCount>1?'+'+pts+' x'+this.comboCount:'+'+pts, col));
      initAC(); sfxBreak();
    }
  }

  resolveCollision(world) {
    const col1 = Math.floor((this.wx+1)/TILE);
    const col2 = Math.floor((this.wx+this.w-2)/TILE);
    const bot  = Math.floor((this.wy+this.h)/TILE);
    const top  = Math.floor(this.wy/TILE);

    if(this.vy >= 0) {
      const t1 = world.getTile(bot,col1), t2 = world.getTile(bot,col2);
      if(t1===T_SOLID||t2===T_SOLID||t1===T_ICE||t2===T_ICE){
        const prevBot = this.wy+this.h-this.vy;
        const tileTop = bot*TILE;
        if(prevBot <= tileTop+1){
          this.wy = tileTop-this.h;
          this.vy = 0;
          this.onGround = true;
        }
      }
    }

    if(this.vy < 0) {
      const t1 = world.getTile(top,col1), t2 = world.getTile(top,col2);
      if(t1===T_ICE||t2===T_ICE){
        const b1=world.breakIce(top,col1), b2=world.breakIce(top,col2);
        if(b1||b2){ initAC(); sfxBreak(); this.score+=Math.round(100*gs.scoreMult); }
      }
      if(t1===T_SOLID||t2===T_SOLID){
        this.wy=(top+1)*TILE;
        this.vy=0;
      }
    }
  }

  die(world) {
    if(!this.alive) return;
    this.lives--;
    initAC(); sfxDie();
    this.alive = false;
    this.powerActive = 0;
  }

  respawn(world) {
    const startRow = 3 + (TOTAL_FLOORS-1)*3 + 2;
    this.wy = startRow*TILE - this.h;
    this.vx=0; this.vy=0;
    this.onGround=false;
    this.alive=true;
    this.powerActive=0; this.stompLanded=false;
    this.invTimer = gs.diffSettings ? gs.diffSettings.invFrames : 120;
  }

  getBounds(){ return {x:this.wx+1,y:this.wy+1,w:this.w-2,h:this.h-2}; }

  draw(camY) {
    if(!this.alive) return;
    if(this.invTimer>0 && Math.floor(this.invTimer/4)%2===0) return;
    const sx = Math.round(this.wx);
    const sy = Math.round(this.wy-camY);
    if(sy < -this.h-4 || sy > NH+4) return;

    // Power glow
    if(this.powerActive>0 && this.powerCooldown>270){
      const ch = CHARS[this.charIdx];
      X.globalAlpha = 0.5*(Math.sin(gs.tick*0.4)*0.5+0.5);
      X.fillStyle = ch.powerCol;
      X.fillRect(sx-2,sy-2,this.w+4,this.h+4);
      X.globalAlpha=1;
    }
    // FLY: upward star trail
    if(this.powerType==='FLY' && this.powerActive>0){
      X.fillStyle='#C880FF'; X.globalAlpha=0.6;
      for(let i=0;i<3;i++){
        const ty=(sy+this.h+(i*5))%NH;
        X.fillRect(sx+Math.random()*14|0,ty,2,2);
      }
      X.globalAlpha=1;
    }

    drawChar(sx, sy, this.charIdx, this.frame, this.facing, this.hammerTimer>8);
  }

  get progress(){ return this.wy; }
}

function rectsOverlap(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// ── Camera ──────────────────────────────────────────────
function updateCamera(camY, players, world, dt) {
  let minWY = world.HEIGHT;
  players.forEach(p=>{ if(p.alive && p.wy < minWY) minWY=p.wy; });
  const target = Math.max(0, Math.min(world.HEIGHT-NH, minWY - NH*0.65));
  return camY + (target - camY) * 0.08;
}

// ── HUD ─────────────────────────────────────────────────
function drawHUD(players, round, twoPlayer) {
  X.fillStyle='#000018';
  X.fillRect(0,0,NW,16);

  for(let i=0;i<players.length;i++){
    const p = players[i];
    const xOff = twoPlayer ? i*128 : 0;
    const w = twoPlayer ? 128 : NW;
    // Score
    X.fillStyle='#F8F8F8'; X.font='6px '+PF;
    X.fillText((i===0?'P1:':'P2:')+p.score.toString().padStart(6,'0'), xOff+4, 9);
    // Lives
    for(let l=0;l<p.lives;l++){
      const liw = xOff + w - 14 - l*11;
      X.save(); X.translate(liw,1); X.scale(0.5,0.5);
      drawChar(0,0,p.charIdx,0,1,false);
      X.restore();
    }
    // Power bar (3px strip at bottom of HUD)
    const bx = xOff+4;
    const bww = (twoPlayer ? 76 : 110);
    X.fillStyle='#001820'; X.fillRect(bx,12,bww,3);
    const pct = p.powerCooldown===0 ? 1 : 1-(p.powerCooldown/300);
    const ch = CHARS[p.charIdx];
    const powerOn = p.powerActive>0;
    X.fillStyle = powerOn
      ? (Math.floor(gs.tick/3)%2===0?'#FFFFFF':ch.powerCol)
      : (p.powerCooldown===0?'#00FFAA':ch.powerCol);
    X.fillRect(bx,12,Math.round(bww*pct),3);
  }

  // Round + story info
  X.fillStyle='#F8D800'; X.font='6px '+PF;
  X.fillText('MTN '+(round+1), NW/2-18, 9);
  // Wind
  if(round >= 3 && Math.abs(windForce) > 0.08){
    const arrow = windForce > 0 ? '>' : '<';
    X.globalAlpha=Math.min(1,Math.abs(windForce)*2);
    X.fillStyle='#A8DCFF'; X.font='7px '+PF;
    X.fillText('~'+arrow, NW/2+20, 9);
    X.globalAlpha=1;
  }
}

const PF = '"Press Start 2P", monospace';

function drawText(text, x, y, col, size) {
  X.fillStyle = col || '#F8F8F8';
  X.font = (size||8)+'px '+PF;
  X.fillText(text, x, y);
}

function drawCenteredText(text, y, col, size) {
  X.fillStyle = col||'#F8F8F8';
  X.font=(size||8)+'px '+PF;
  const w = X.measureText(text).width;
  X.fillText(text, Math.floor((NW-w)/2), y);
}

function drawTextCX(text, cx, y, col, size) {
  X.fillStyle = col||'#F8F8F8';
  X.font=(size||8)+'px '+PF;
  const w = X.measureText(text).width;
  X.fillText(text, Math.floor(cx-w/2), y);
}

// ── Mode Select ──────────────────────────────────────────
function drawModeSelect(tick) {
  X.fillStyle='#000C20'; X.fillRect(0,0,NW,NH);
  // Stars
  X.fillStyle='#FFFFFF';
  const sr=seededRng(77);
  for(let i=0;i<35;i++) X.fillRect(sr()*NW|0,sr()*(NH*0.7)|0,1,1);

  drawCenteredText('MODO DE JUEGO', 18, '#F8D800', 8);

  // ── Difficulty row ──
  const diffActive = gs.modeRow===0;
  X.fillStyle = diffActive?'rgba(255,255,255,0.06)':'transparent';
  if(diffActive) X.fillRect(4,24,NW-8,26);
  drawCenteredText('DIFICULTAD', 34, diffActive?'#FFFFFF':'#555', 6);
  const diffW=70, diffGap=4, diffTotalW=3*diffW+2*diffGap, diffX=(NW-diffTotalW)/2;
  DIFFICULTIES.forEach((d,i)=>{
    const bx=diffX+i*(diffW+diffGap), by=37;
    const sel=gs.difficulty===i;
    X.fillStyle=sel?(diffActive?'#1A3860':'#0A1820'):'#080C14';
    X.fillRect(bx,by,diffW,14);
    if(sel && diffActive){ X.strokeStyle='#F8D800'; X.lineWidth=1; X.strokeRect(bx+0.5,by+0.5,diffW-1,13); }
    else if(sel){ X.strokeStyle='#555'; X.lineWidth=1; X.strokeRect(bx+0.5,by+0.5,diffW-1,13); }
    const tcol=sel?(diffActive?'#F8D800':'#AAA'):'#444';
    drawTextCX(d.label, bx+diffW/2, by+10, tcol, 5);
  });

  // ── Story row ──
  const storActive = gs.modeRow===1;
  if(storActive) { X.fillStyle='rgba(255,255,255,0.06)'; X.fillRect(4,60,NW-8,50); }
  drawCenteredText('HISTORIA', 72, storActive?'#FFFFFF':'#555', 6);
  const st = STORIES[gs.story];
  // Arrow buttons
  drawTextCX(gs.story>0?'<':'', 22, 92, storActive?'#A0C8FF':'#333', 8);
  drawTextCX(gs.story<2?'>':'', NW-22, 92, storActive?'#A0C8FF':'#333', 8);
  // Story name
  drawCenteredText(st.name, 92, storActive?'#F8D800':'#888', 7);
  // Score mult badge
  const smul=st.scoreMult>1.0?'x'+st.scoreMult.toFixed(1)+' SCORE':'';
  drawCenteredText(st.desc, 104, storActive?'#A0C8FF':'#444', 5);
  if(smul) drawCenteredText(smul, 111, storActive?'#00FFAA':'#334', 5);

  // ── Controls hint ──
  drawCenteredText(diffActive?'< > elegir  Enter confirmar':'< > elegir  Enter confirmar', 130, '#444', 5);
  drawCenteredText('arriba/abajo: cambiar fila', 139, '#333', 5);
  if(Math.floor(tick/20)%2===0) drawCenteredText('ENTER = continuar', 155, '#F8F8F8', 6);
  drawCenteredText('ESC = titulo', 168, '#333', 5);
}

// ── Title Screen ─────────────────────────────────────────
function drawTitle(tick) {
  X.fillStyle='#000830'; X.fillRect(0,0,NW,NH);
  X.fillStyle='#FFFFFF';
  const sr=seededRng(42);
  for(let i=0;i<50;i++){ X.fillRect(sr()*NW|0,(sr()*NH*0.6)|0,1,1); }

  X.fillStyle='#102060';
  X.beginPath(); X.moveTo(0,NH); X.lineTo(40,120); X.lineTo(80,80);
  X.lineTo(128,40); X.lineTo(176,80); X.lineTo(216,120); X.lineTo(NW,NH); X.fill();

  X.fillStyle='#E8F4FF';
  X.beginPath(); X.moveTo(120,44); X.lineTo(136,58); X.lineTo(128,40); X.fill();

  drawCenteredText('ICE CLIMBER', 72, '#A8DCFF', 16);
  drawCenteredText('ICE CLIMBER', 71, '#FFFFFF', 16);
  drawCenteredText('JUNIORS PRODUCCIONES', 90, '#F8D800', 8);
  if(highScore > 0) drawCenteredText('HI: '+highScore.toString().padStart(6,'0'), 100, '#F8A000', 7);

  const cx = [28,74,120,166,212];
  CHARS.forEach((ch,i)=>{
    drawChar(cx[i], 104, i, (tick>>3)&1, 1, false);
    drawTextCX(ch.name.split(' ')[0], cx[i]+8, 128, '#C8C8C8', 5);
  });

  if(Math.floor(tick/20)%2===0)
    drawCenteredText('PRESIONA ENTER', 175, '#F8F800', 8);

  drawCenteredText('1-2 jugadores', 188, '#A8A8A8', 7);
  drawCenteredText('Z=Saltar  X=Martillo', 200, '#686868', 7);
  drawCenteredText('© 2026 Juniors Producciones', 230, '#484848', 6);
}

// ── Character Select ─────────────────────────────────────
function drawCharSelect(tick) {
  X.fillStyle='#001028'; X.fillRect(0,0,NW,NH);
  drawCenteredText('ELEGIR PERSONAJE', 14, '#F8D800', 7);

  const step = gs.selStep;
  const labCol = step===0 ? '#6888FF' : '#FF88CC';
  drawCenteredText(step===0?'JUGADOR 1':'JUGADOR 2', 26, labCol, 6);

  CHARS.forEach((ch,i)=>{
    const sx = 28 + i*46, sy = 44;
    const sel = gs.charSel[step]===i;
    if(sel){
      X.fillStyle = step===0 ? '#F8D800' : '#FF88CC';
      X.fillRect(sx-3,sy-3,22,26);
    }
    if(gs.twoPlayer && step===1 && gs.charSel[0]===i){
      X.fillStyle='#884400'; X.fillRect(sx-1,sy-1,18,20);
    }
    drawChar(sx, sy, i, (tick>>3)&1, 1, false);
    const nm = ch.name.split(' ')[0];
    drawTextCX(nm, sx+8, sy+26, sel?'#F8D800':'#C8C8C8', 5);
    // Power short name
    drawTextCX(ch.powerShort, sx+8, sy+34, sel?ch.powerCol:'#404040', 5);
  });

  if(step===1){
    drawCenteredText('P1: '+CHARS[gs.charSel[0]].name.split(' ')[0], 90, '#6888FF', 6);
  }

  if(step===0){
    const t1c = !gs.twoPlayer ? '#F8D800' : '#666';
    const t2c =  gs.twoPlayer ? '#F8D800' : '#666';
    drawCenteredText((!gs.twoPlayer?'>':' ')+' 1 JUGADOR',  110, t1c, 6);
    drawCenteredText(( gs.twoPlayer?'>':' ')+' 2 JUGADORES', 122, t2c, 6);
    drawCenteredText('ARRIBA/ABAJO=MODO', 136, '#555', 5);
  }

  // Power hint for selected char
  const sc = CHARS[gs.charSel[step]];
  drawCenteredText('PODER: '+sc.powerName, 152, sc.powerCol, 5);
  drawCenteredText('Activar: X en el aire', 161, '#444', 5);

  if(Math.floor(tick/20)%2===0)
    drawCenteredText('ENTER=CONFIRMAR', 174, '#F8F8F8', 6);
}

// ── Game Over ────────────────────────────────────────────
function drawGameOver(tick) {
  X.fillStyle='#000000'; X.fillRect(0,0,NW,NH);
  drawCenteredText('GAME OVER', 90, '#F80000', 16);
  gs.players.forEach((p,i)=>{
    drawCenteredText((i===0?'P1':'P2')+' '+CHARS[p.charIdx].name+': '+p.score, 120+i*16, '#F8F8F8', 8);
  });
  drawCenteredText('HI: '+highScore.toString().padStart(6,'0'), 152, '#F8A000', 7);
  if(Math.floor(tick/20)%2===0) drawCenteredText('ENTER = volver al menu', 170, '#F8D800', 7);
}

// ── Round Clear ──────────────────────────────────────────
function drawRoundClear(tick) {
  X.fillStyle='rgba(0,0,0,0.7)'; X.fillRect(0,0,NW,NH);
  drawCenteredText('CUMBRE!', 90, '#F8D800', 16);
  drawCenteredText('Montana '+(gs.round+1)+' completada', 114, '#F8F8F8', 8);
  if(Math.floor(tick/15)%2===0) drawCenteredText('Preparate...', 140, '#A8A8F8', 7);
}

// ── Game State Machine ───────────────────────────────────
let windForce=0, windChangeTimer=0;

let gs = {
  state:'title', round:0, twoPlayer:false, players:[], world:null,
  camY:0, tick:0, charSel:[0,1], selStep:0, flashTimer:0,
  bonusTimer:0, respawnTimers:[],
  difficulty:1, story:0, modeRow:0, storyIntro:0,
  scoreMult:1.0, diffSettings:DIFFICULTIES[1]
};

function initGame(twoPlayer, chars) {
  stopFC();
  initAC(); playGameMusic();
  gs.twoPlayer = twoPlayer;
  gs.round = 0;
  gs.diffSettings = DIFFICULTIES[gs.difficulty];
  gs.scoreMult = STORIES[gs.story].scoreMult;
  gs.storyIntro = 120;
  gs.players = [];
  const startRow = 3 + (TOTAL_FLOORS-1)*3 + 2;
  const p1 = new Player(NW/2 - 20, chars[0]);
  const p2 = new Player(NW/2 + 4,  chars[1]);
  p1.wy = startRow*TILE - p1.h;
  p2.wy = startRow*TILE - p2.h;
  gs.players.push(p1);
  if(twoPlayer) gs.players.push(p2);
  gs.world = new World(gs.round);
  gs.camY = Math.max(0, p1.wy - NH*0.7);
  gs.respawnTimers = [0, 0];
  gs.state = 'playing';
}

function startNextRound() {
  gs.round++;
  gs.diffSettings = DIFFICULTIES[gs.difficulty];
  gs.scoreMult = STORIES[gs.story].scoreMult;
  const startRow = 3 + (TOTAL_FLOORS-1)*3 + 2;
  gs.world = new World(gs.round);
  gs.players.forEach(p=>{
    p.wy = startRow*TILE - p.h;
    p.vx=0; p.vy=0; p.alive=true; p.invTimer=60; p.powerActive=0;
  });
  gs.camY = gs.players[0].wy - NH*0.7;
  gs.state = 'playing';
}

// ── Bonus Stage ─────────────────────────────────────────
let bonusItems = [];
function startBonus() {
  gs.state = 'bonus';
  gs.bonusTimer = 300;
  bonusItems = [];
  bonusItems.push({ type:'condor', x:NW*0.5, y:20, vx:2, vy:0, alive:true });
  for(let i=0;i<6;i++){
    bonusItems.push({
      type:'veggie', x:Math.random()*NW, y:-TILE*(i*3+1),
      vx:(Math.random()-0.5)*2, vy:1.2+Math.random()*0.8, alive:true,
      col:['#F86000','#F8C000','#38C800','#F80000'][i%4]
    });
  }
}

function updateBonus() {
  gs.bonusTimer--;
  bonusItems.forEach(item=>{
    if(!item.alive) return;
    item.x += item.vx; item.y += item.vy;
    if(item.type==='condor'){
      if(item.x<0||item.x>NW-16) item.vx*=-1;
      gs.players.forEach(p=>{
        if(!p.alive) return;
        if(Math.abs(p.wx-item.x)<16 && Math.abs(p.wy-gs.camY-item.y)<16){
          item.alive=false; p.score+=Math.round(1000*gs.scoreMult); initAC(); sfxBonus();
        }
      });
    } else {
      if(item.y > NH) item.alive=false;
      gs.players.forEach(p=>{
        if(!p.alive) return;
        const sy = p.wy - gs.camY;
        const dx=p.wx-item.x, dy=sy-item.y;
        if(Math.sqrt(dx*dx+dy*dy)<14){ item.alive=false; p.score+=Math.round(200*gs.scoreMult); initAC(); sfxBonus(); }
      });
    }
  });
  if(gs.bonusTimer<=0 || !bonusItems.some(i=>i.alive&&i.type==='condor')){
    setTimeout(startNextRound, 800);
    gs.state='round_clear';
  }
}

function drawBonus(camY) {
  X.fillStyle=SKY[(gs.round+STORIES[gs.story].skyOff)%SKY.length]; X.fillRect(0,0,NW,NH);
  drawCenteredText('BONUS!', 30, '#F8D800', 16);
  drawCenteredText('Agarra el condor! '+gs.bonusTimer, 50, '#F8F8F8', 8);
  bonusItems.forEach(item=>{
    if(!item.alive) return;
    if(item.type==='condor'){
      px(item.x,item.y,16,12,'#804000');
      px(item.x+2,item.y,12,4,'#A05000');
      px(item.x+6,item.y+4,4,4,'#000');
      px(item.x-2,item.y+4,4,4,'#804000');
      px(item.x+14,item.y+4,4,4,'#804000');
      drawText('+1000',item.x-4,item.y-4,'#F8D800',7);
    } else {
      X.fillStyle=item.col; X.beginPath();
      X.arc(item.x+8,item.y+8,7,0,Math.PI*2); X.fill();
    }
  });
  gs.players.forEach(p=>p.draw(camY));
  drawHUD(gs.players, gs.round, gs.twoPlayer);
}

// ── Main Loop ────────────────────────────────────────────
let prevTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - prevTime)/16.67, 3);
  prevTime = ts;
  gs.tick++;
  updateJP();

  X.fillStyle='#000'; X.fillRect(0,0,NW,NH);

  if(gs.state==='title') {
    drawTitle(gs.tick);
    if(jp('Enter')||jp('KeyZ')){
      gs.state='mode_select';
      gs.modeRow=0;
      initAC(); sfxSelect(); playFC();
    }
  }

  else if(gs.state==='mode_select') {
    drawModeSelect(gs.tick);
    if(jp('ArrowUp')||jp('KeyW'))   { gs.modeRow=Math.max(0,gs.modeRow-1); sfxSelect(); }
    if(jp('ArrowDown')||jp('KeyS')) { gs.modeRow=Math.min(1,gs.modeRow+1); sfxSelect(); }
    if(jp('ArrowLeft')||jp('KeyA')){
      if(gs.modeRow===0) gs.difficulty=Math.max(0,gs.difficulty-1);
      else               gs.story=Math.max(0,gs.story-1);
      sfxSelect();
    }
    if(jp('ArrowRight')||jp('KeyD')){
      if(gs.modeRow===0) gs.difficulty=Math.min(2,gs.difficulty+1);
      else               gs.story=Math.min(2,gs.story+1);
      sfxSelect();
    }
    if(jp('Enter')||jp('KeyZ')){
      gs.state='char_select';
      gs.charSel=[0,1]; gs.selStep=0; gs.twoPlayer=false;
      sfxSelect();
    }
    if(jp('Escape')) { gs.state='title'; sfxSelect(); }
  }

  else if(gs.state==='char_select') {
    drawCharSelect(gs.tick);
    if(gs.selStep===0){
      if(jp('ArrowUp')||jp('ArrowDown')||jp('KeyW')||jp('KeyS')){ gs.twoPlayer=!gs.twoPlayer; sfxSelect(); }
    }
    if(jp('ArrowLeft')||jp('KeyA')){ gs.charSel[gs.selStep]=(gs.charSel[gs.selStep]+CHARS.length-1)%CHARS.length; sfxSelect(); }
    if(jp('ArrowRight')||jp('KeyD')){ gs.charSel[gs.selStep]=(gs.charSel[gs.selStep]+1)%CHARS.length; sfxSelect(); }
    if(jp('Enter')||jp('KeyZ')){
      sfxSelect();
      if(!gs.twoPlayer || gs.selStep===1){
        initGame(gs.twoPlayer, gs.charSel);
      } else {
        gs.selStep=1;
        if(gs.charSel[1]===gs.charSel[0]) gs.charSel[1]=(gs.charSel[0]+1)%CHARS.length;
      }
    }
    if(jp('Escape')) { gs.state='mode_select'; sfxSelect(); }
  }

  else if(gs.state==='playing') {
    if(jp('KeyP') || jp('Escape') || jp('Enter')) { gs.state='paused'; }

    const world = gs.world;
    const players = gs.players;

    // Wind
    const wMax = gs.diffSettings ? gs.diffSettings.windMax : 0.7;
    if(gs.round >= 3 && wMax > 0){
      windChangeTimer--;
      if(windChangeTimer<=0){ windForce=(Math.random()-0.5)*wMax*2; windChangeTimer=150+Math.random()*150|0; }
    } else { windForce=0; }

    players.forEach((p,i)=>{
      if(p.alive){
        p.update(world, i===0?p1Input():p2Input(), gs.camY);
        if(p.wy < 4*TILE && p.alive){
          p.score += Math.round(500*(gs.round+1)*gs.scoreMult);
          startBonus();
          return;
        }
      } else {
        gs.respawnTimers[i] = (gs.respawnTimers[i]||0)+1;
        if(gs.respawnTimers[i]>120 && p.lives>0){
          gs.respawnTimers[i]=0;
          p.respawn(world);
        }
      }
    });

    const allDead = players.every(p=>!p.alive&&p.lives<=0);
    if(allDead){
      const topScore=Math.max(...players.map(p=>p.score));
      if(topScore>highScore){ highScore=topScore; localStorage.setItem('iceClimberHiScore',highScore); }
      gs.state='gameover'; gs.tick=0; stopGameMusic(); initAC(); playFC();
    }

    world.update();
    gs.camY = updateCamera(gs.camY, players, world, dt);

    updateShake();
    X.save(); X.translate(shakeOffX, shakeOffY);
    world.draw(gs.camY, gs.round);
    players.forEach(p=>p.draw(gs.camY));
    for(let i=iceParticles.length-1;i>=0;i--){
      iceParticles[i].update(); iceParticles[i].draw(gs.camY);
      if(iceParticles[i].life<=0) iceParticles.splice(i,1);
    }
    for(let i=floatingTexts.length-1;i>=0;i--){
      floatingTexts[i].update(); floatingTexts[i].draw(gs.camY);
      if(floatingTexts[i].life<=0) floatingTexts.splice(i,1);
    }
    X.restore();
    drawHUD(players, gs.round, gs.twoPlayer);

    // Height bar
    const maxH = world.HEIGHT;
    const progH = 200;
    const progX = NW-6;
    X.fillStyle='#000040'; X.fillRect(progX,16,4,progH);
    players.forEach((p,i)=>{
      const pct = 1-(p.wy/maxH);
      X.fillStyle = i===0 ? CHARS[p.charIdx].body : CHARS[p.charIdx].accent;
      X.fillRect(progX, 16+progH-(pct*progH)|0, 4, 4);
    });
    X.fillStyle='#F8D800'; X.fillRect(progX-1,14,6,2);

    // Story intro overlay
    if(gs.storyIntro>0){
      gs.storyIntro--;
      const a=Math.min(gs.storyIntro/40,1);
      X.globalAlpha=a*0.8; X.fillStyle='#000028'; X.fillRect(0,75,NW,55); X.globalAlpha=1;
      X.globalAlpha=a;
      const st=STORIES[gs.story];
      drawCenteredText(st.name, 98, '#F8D800', 8);
      drawCenteredText(st.desc, 113, '#A0C8FF', 6);
      if(gs.diffSettings) drawCenteredText(DIFFICULTIES[gs.difficulty].label, 123, '#AAFFAA', 5);
      X.globalAlpha=1;
    }
  }

  else if(gs.state==='paused') {
    gs.world.draw(gs.camY, gs.round);
    gs.players.forEach(p=>p.draw(gs.camY));
    drawHUD(gs.players, gs.round, gs.twoPlayer);
    X.fillStyle='rgba(0,0,0,0.6)'; X.fillRect(0,0,NW,NH);
    drawCenteredText('PAUSA', NH/2-14, '#F8D800', 16);
    drawCenteredText('P / ESC / START para continuar', NH/2+8, '#F8F8F8', 7);
    if(jp('KeyP') || jp('Escape') || jp('Enter')) { gs.state='playing'; }
  }

  else if(gs.state==='bonus') {
    updateBonus();
    drawBonus(gs.camY);
  }

  else if(gs.state==='round_clear') {
    gs.world.draw(gs.camY, gs.round);
    gs.players.forEach(p=>p.draw(gs.camY));
    drawHUD(gs.players, gs.round, gs.twoPlayer);
    drawRoundClear(gs.tick);
  }

  else if(gs.state==='gameover') {
    drawGameOver(gs.tick);
    if(jp('Enter')||jp('KeyZ')){ gs.state='title'; playFC(); }
  }
}

// Auto-pausa al cambiar de pestaña/app: no morir en background ni seguir sonando
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden){
    if(gs.state==='playing') gs.state='paused';
    if(AC && AC.state==='running') AC.suspend();
  } else {
    if(AC && AC.state==='suspended') AC.resume();
  }
});

document.fonts.ready.then(()=>requestAnimationFrame(loop));
</script>
